# Home Assistant add-on config — Finance Tracker (TODO-203, DEC-021 safe baseline).
#
# SECURITY INVARIANTS (threat model R1/R4 — do not relax in any future version):
#   - NO `ports:` key: the app is reachable ONLY through HA's authenticated ingress.
#   - NO `map:` entries: /data (private, writable) is automatic; mapping
#     homeassistant_config/config would expose HA's own recorder DB to this container.
#   - NO privileged/host_network/*_api grants beyond what's listed.
name: Finance Tracker
version: "0.1.2"
slug: finance_tracker
description: >-
  Personal income-tax, budget, and plan-vs-actual tracker (FastAPI + SQLite).
  Data stays in this add-on's private /data — it never leaves your network.
url: https://github.com/RR-AMATOK/financial-planning-suite
arch:
  - aarch64
  - amd64
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:finance
panel_title: Finance
backup: cold
watchdog: http://[HOST]:[PORT:8099]/health
services:
  - mqtt:want
options: {}
schema: {}
